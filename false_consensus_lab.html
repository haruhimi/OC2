<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>フォールス・コンセンサス・ラボ｜立正大学 心理学部</title>
<style>
  /* ---- 配色はFCEポスター（濃茶＋ピンク）に合わせてブースで揃える ---- */
  :root{
    --bg:#241b14; --panel:#332619; --line:#4a3826;
    --accent:#e8508d;       /* ピンク（ポスターのアクセント） */
    --accent2:#f4a63a;      /* 補助アクセント（オレンジ） */
    --a:#e8508d;            /* 選択肢A の色 */
    --b:#3fa9b6;            /* 選択肢B の色 */
    --text:#f6efe6; --sub:#c3b09c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    background:radial-gradient(1200px 900px at 50% 15%, #33261a, var(--bg));
    color:var(--text); font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",system-ui,sans-serif;
    overflow:hidden; user-select:none; touch-action:manipulation;
  }
  #stage{position:fixed; inset:0;}
  .screen{display:none; position:absolute; inset:0; align-items:center; justify-content:center;
          flex-direction:column; text-align:center; padding:5vmin;}
  .screen.active{display:flex;}

  h1{font-size:8vmin; margin:0 0 2vmin; letter-spacing:.03em; line-height:1.2;}
  .accent{color:var(--accent);}
  .lead{font-size:3.4vmin; color:var(--sub); margin:1vmin 0; line-height:1.6;}
  .pulse{animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.45} 50%{opacity:1}}

  /* ---- 大ボタン（スタート・次へ・もう一度） ---- */
  .start,.next,.again{
    margin-top:6vmin; background:var(--accent); color:#2a0f1c; border:none; border-radius:3vmin;
    padding:3.2vmin 8vmin; font-size:4.2vmin; font-weight:800; cursor:pointer; box-shadow:0 1vmin 0 rgba(0,0,0,.3);
  }
  .start:active,.next:active,.again:active{transform:translateY(.5vmin); box-shadow:0 .4vmin 0 rgba(0,0,0,.3);}
  .tap{font-size:3vmin; color:var(--sub); margin-top:5vmin;}
  .step{font-size:3vmin; color:var(--accent2); font-weight:800; letter-spacing:.15em; margin-bottom:2vmin;}

  /* ---- STEP1 選ぶ ---- */
  .question{font-size:6vmin; font-weight:800; margin-bottom:6vmin; line-height:1.3;}
  .btnRow{display:flex; gap:6vmin; flex-wrap:wrap; justify-content:center;}
  .choice{
    border:none; border-radius:4vmin; padding:7vmin 6vmin; font-size:6vmin; font-weight:800; color:#fff;
    cursor:pointer; min-width:38vmin; box-shadow:0 1.4vmin 0 rgba(0,0,0,.3); transition:transform .06s;
  }
  .choice:active{transform:translateY(.8vmin); box-shadow:0 .6vmin 0 rgba(0,0,0,.3);}
  .choice.a{background:var(--a);}
  .choice.b{background:var(--b);}
  .vs{font-size:4vmin; color:var(--sub); font-weight:800; align-self:center;}

  /* ---- STEP2 予想（スライダー） ---- */
  .predQ{font-size:4.6vmin; font-weight:800; line-height:1.5; margin-bottom:0; max-width:88vmin;}
  .predQ .hl{color:var(--accent);}
  .predVal{font-size:20vmin; font-weight:900; line-height:1; margin:2vmin 0; color:var(--accent);}
  .predVal small{font-size:7vmin;}
  .sliderWrap{width:84vmin; max-width:92%; margin:2vmin 0;}
  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:5vmin; border-radius:2.5vmin;
    background:linear-gradient(90deg, var(--accent) 0%, var(--accent) 50%, #4a3826 50%);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:11vmin; height:11vmin; border-radius:50%;
    background:#fff; border:1vmin solid var(--accent); box-shadow:0 .6vmin 1.5vmin rgba(0,0,0,.4); cursor:pointer;
  }
  .sliderEnds{display:flex; justify-content:space-between; font-size:2.8vmin; color:var(--sub); margin-top:1vmin;}
  .hint{font-size:2.8vmin; color:var(--sub); margin-top:3vmin;}

  /* ---- STEP3 結果（1問完結のオチ） ---- */
  .rvHead{font-size:5.4vmin; font-weight:800; margin-bottom:3vmin;}
  .cmpRow{display:flex; align-items:center; gap:3vmin; width:84vmin; max-width:92%; margin:2vmin 0;}
  .cmpTag{width:24vmin; text-align:right; font-size:3.4vmin; font-weight:700;}
  .cmpBar{flex:1; height:8vmin; background:#1c140d; border-radius:4vmin; overflow:hidden;}
  .cmpBar > span{display:block; height:100%; width:0; transition:width 1s cubic-bezier(.2,.8,.2,1); border-radius:4vmin;}
  .cmpBar.pred > span{background:linear-gradient(90deg,#8a95a3,#c3b09c);}
  .cmpBar.real > span{background:linear-gradient(90deg,var(--accent),#ff7fb0);}
  .cmpPct{width:16vmin; text-align:left; font-size:4.4vmin; font-weight:800;}
  .punch{font-size:5vmin; font-weight:900; margin-top:4vmin; line-height:1.4; max-width:88vmin;}
  .punch .hl{color:var(--accent2);}
  .sub2{font-size:3.4vmin; color:var(--sub); margin-top:2.5vmin; line-height:1.6; max-width:84vmin;}
  .sub2 b{color:var(--text);}
  .cite{font-size:2.6vmin; color:var(--sub); max-width:82vmin; line-height:1.7; margin-top:3vmin;}

  /* 長押しリセット：来場者の誤爆を防ぎつつ運営者は確実に押せる */
  .reset{position:fixed; bottom:2vmin; left:2vmin; opacity:.35; font-size:2.4vmin; color:#fff;
         background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.25); border-radius:2vmin;
         padding:1.3vmin 2.8vmin; overflow:hidden; cursor:pointer;}
  .reset .fill{position:absolute; left:0; top:0; bottom:0; width:0; background:var(--accent); z-index:-1;}
  .reset.holding .fill{width:100%; transition:width 1.5s linear;}
</style>
</head>
<body>
<div id="stage">

  <!-- ATTRACT -->
  <section id="attract" class="screen active">
    <h1>「みんなも <span class="accent">きっと</span>、<br>そう思ってる」？</h1>
    <p class="lead">その“みんな”、実はあなた自身の写し鏡かも。</p>
    <p class="lead">かんたんな質問に答えて、<b>あなたの予想</b>と<b>実際</b>を比べてみよう。</p>
    <button class="start" onclick="App.start()">タッチしてスタート ▶</button>
    <p class="tap pulse">立正大学 心理学部　対人・社会心理学</p>
  </section>

  <!-- STEP1 CHOICE -->
  <section id="choice" class="screen">
    <div class="step">STEP 1 ── あなたはどっち？</div>
    <div class="question" id="qtext"></div>
    <div class="btnRow">
      <button class="choice a" id="btnA" onclick="App.choose('a')"></button>
      <div class="vs">VS</div>
      <button class="choice b" id="btnB" onclick="App.choose('b')"></button>
    </div>
    <p class="tap">直感でOK！</p>
  </section>

  <!-- STEP2 PREDICT -->
  <section id="predict" class="screen">
    <div class="step">STEP 2 ── 何％いると思う？</div>
    <div class="predQ" id="predQtext"></div>
    <div class="predVal"><span id="predNum">50</span><small>％</small></div>
    <div class="sliderWrap">
      <input type="range" id="slider" min="0" max="100" value="50" step="1"
             oninput="App.onSlide(this.value)">
      <div class="sliderEnds"><span>0％</span><span>半分</span><span>100％</span></div>
    </div>
    <p class="hint">スライダーを動かして予想 → 決定</p>
    <button class="next" onclick="App.submitPred()">この予想で決定 ▶</button>
  </section>

  <!-- STEP3 RESULT -->
  <section id="result" class="screen">
    <div class="rvHead" id="rvHead"></div>
    <div class="cmpRow">
      <div class="cmpTag">あなたの予想</div>
      <div class="cmpBar pred"><span id="barPred"></span></div>
      <div class="cmpPct" id="pctPred"></div>
    </div>
    <div class="cmpRow">
      <div class="cmpTag">実際は…</div>
      <div class="cmpBar real"><span id="barReal"></span></div>
      <div class="cmpPct" id="pctReal"></div>
    </div>
    <div class="punch" id="punch"></div>
    <div class="sub2" id="sub2"></div>
    <div class="cite">
      これが <b>フォールス・コンセンサス効果</b>（Ross, Greene, &amp; House, 1977）。<br>
      自分と似た人に囲まれ、自分の考えが“当たり前”に感じるほど、「みんなも同じ」と多めに見積もります。
    </div>
    <button class="again" onclick="App.start()">もう一度 / 次の人へ ▶</button>
  </section>

</div>

<button class="reset" id="resetBtn"><span class="fill"></span>長押しでリセット</button>

<script>
/* =========================================================================
   フォールス・コンセンサス・ラボ  ── 試作 v0.2（1問・即体感型）
   立正大学 心理学部 対人・社会心理学ゾーン iPad展示

   ■ ねらい：一人が1回やるだけで「自分の側を多めに見た」を体感させる。
     STEP1 どっち？        二択のお題に答える（スタートごとにランダムで1問）
     STEP2 何％いると思う？ 自分と同じ側は何％か をスライダーで予想
     STEP3 結果            予想 vs 実際。ズレを大きく見せて「これがFCE」

   ■ 一人でもオチが出る仕組み：
     各お題に中立50:50の軽い下駄（aSeed / bSeed）を入れておき、そこへ
     来場者の実回答を足して「実際」を計算する。人が増えるほど実測に寄る。

   ■ お題を足す/変える → 下の QUESTIONS 配列を編集（a=左, b=右）。
     意見が割れる（半々に近い）お題ほどFCEが綺麗に出ます。
   ■ データは localStorage に累積。右下 reset で消去。
   ========================================================================= */

const QUESTIONS = [
  { id:"kinoko",  text:"きのこの山と たけのこの里", a:"きのこの山",   b:"たけのこの里", aSeed:8, bSeed:8 },
  { id:"asagohan",text:"朝ごはんは パン？ ごはん？", a:"パン",         b:"ごはん",       aSeed:8, bSeed:8 },
  { id:"inuneko", text:"あなたは 犬派？ 猫派？",     a:"犬派",         b:"猫派",         aSeed:8, bSeed:8 },
  { id:"tabi",    text:"旅行の計画、どっち？",       a:"きっちり計画", b:"ばったり",     aSeed:8, bSeed:8 },
  { id:"kinben",  text:"連休の宿題、あなたは？",     a:"先に片づける", b:"最後にまとめて", aSeed:8, bSeed:8 },
];

/* ---- 集計（localStorage）：来場者の実回答だけを貯める（seedは定数） ---- */
const KEY = "fc_lab_stats_v2";
function loadStats(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
function saveStats(s){ localStorage.setItem(KEY, JSON.stringify(s)); }

function record(qid, choice){
  const s = loadStats();
  s[qid] = s[qid] || {a:0, b:0};
  s[qid][choice]++;
  saveStats(s);
  return s[qid];
}

/* ---- 画面制御 ---- */
const SCREENS = ["attract","choice","predict","result"];
function show(id){ SCREENS.forEach(s=>document.getElementById(s).classList.toggle("active", s===id)); }
function $(id){ return document.getElementById(id); }

const App = {
  q:null, sel:null, pred:50,

  start(){
    // スタートごとにランダムで1問（並んだ人に別のお題が出る）
    this.q = QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
    this.sel = null;
    $("qtext").textContent = this.q.text;
    $("btnA").textContent = this.q.a;
    $("btnB").textContent = this.q.b;
    show("choice");
  },

  choose(sel){
    this.sel = sel;
    const ownLabel = (sel==='a') ? this.q.a : this.q.b;
    $("predQtext").innerHTML =
      `あなたと同じ <span class="hl">「${ownLabel}」</span>を選ぶ人は<br>みんなの中で 何％だと思う？`;
    this.pred = 50;
    $("slider").value = 50;
    this.onSlide(50);
    show("predict");
  },

  onSlide(v){
    v = +v;
    this.pred = v;
    $("predNum").textContent = v;
    $("slider").style.background =
      `linear-gradient(90deg, var(--accent) 0%, var(--accent) ${v}%, #4a3826 ${v}%)`;
  },

  submitPred(){
    const o = record(this.q.id, this.sel);
    // 実際の割合＝中立50:50の下駄＋来場者の実回答
    const aTot = this.q.aSeed + o.a;
    const bTot = this.q.bSeed + o.b;
    const total = aTot + bTot;
    const ownActual = Math.round((this.sel==='a' ? aTot : bTot) / total * 100);
    const ownLabel  = (this.sel==='a') ? this.q.a : this.q.b;
    const otherLabel= (this.sel==='a') ? this.q.b : this.q.a;

    $("rvHead").innerHTML = `あなたは <b class="accent">「${ownLabel}」</b>派`;
    $("pctPred").textContent = this.pred + "％";
    $("pctReal").textContent = ownActual + "％";

    const gap = this.pred - ownActual;
    let punch, sub2;
    if(gap >= 5){
      punch = `あなたは自分の側を <span class="hl">${gap}ポイント 多め</span>に見ていました`;
      sub2  = `「みんなも同じ」と感じませんでしたか？　実は <b>「${otherLabel}」派の人も</b>、同じように自分の側を多く見積もります。`;
    } else if(gap <= -5){
      punch = `あなたは自分の側を <span class="hl">${-gap}ポイント 少なめ</span>に見ていました`;
      sub2  = `ちょっと控えめ。でも多くの人は逆に、<b>自分と同じ側を“多め”</b>に見積もります。`;
    } else {
      punch = `予想はほぼピッタリ！<span class="hl">ズレ ${Math.abs(gap)}ポイント</span>`;
      sub2  = `なかなかの直感。でも多くの人は、<b>自分と同じ側を“多め”</b>に見積もりがちです。`;
    }
    $("punch").innerHTML = punch;
    $("sub2").innerHTML = sub2;

    $("barPred").style.width = "0%";
    $("barReal").style.width = "0%";
    show("result");
    setTimeout(()=>{ $("barPred").style.width = this.pred + "%"; $("barReal").style.width = ownActual + "%"; }, 100);
  },

  resetStats(){
    if(confirm("これまでの集計をすべてリセットしますか？")){
      localStorage.removeItem(KEY);
      alert("リセットしました");
    }
  }
};

// アトラクト画面はボタン以外のタッチでも開始
$("attract").addEventListener("click", e=>{ if(e.target.tagName!=="BUTTON") App.start(); });

// リセットは「長押し1.5秒」で発動（来場者の誤爆防止）→ 確認ダイアログ
(function(){
  const rb=$("resetBtn"); let t=null;
  const startHold=e=>{ e.preventDefault(); rb.classList.add("holding");
    t=setTimeout(()=>{ rb.classList.remove("holding"); App.resetStats(); }, 1500); };
  const cancel=()=>{ rb.classList.remove("holding"); clearTimeout(t); };
  rb.addEventListener("pointerdown", startHold);
  ["pointerup","pointerleave","pointercancel"].forEach(ev=>rb.addEventListener(ev, cancel));
})();
</script>
</body>
</html>
